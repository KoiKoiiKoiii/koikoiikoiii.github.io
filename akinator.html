<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akinator Lite</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: linear-gradient(135deg, #0ff, #00f);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .app {
    width: 90%;
    max-width: 420px;
    background: rgba(255,255,255,0.12);
    padding: 20px;
    border-radius: 16px;
    text-align: center;
    color: white;
  }

  h1 { font-size: 20px; margin-bottom: 10px; }

  #q {
    font-size: 18px;
    min-height: 60px;
    margin: 20px 0;
  }

  button {
    padding: 12px 16px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
  }

  .yes { background: #00c853; color: white; }
  .no { background: #ff3d00; color: white; }

  input {
    width: 90%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
  }

  .hidden { display: none; }
</style>
</head>

<body>

<div class="app">
  <h1>Akinator Lite</h1>

  <div id="q">Think of a person...</div>

  <div id="buttons">
    <button class="yes" onclick="answer(true)">Yes</button>
    <button class="no" onclick="answer(false)">No</button>
  </div>

  <div id="learn" class="hidden"></div>
</div>

<script>
let root = load() || {
  text: "Is the person male?",
  yes: { text: "Bryson" },
  no: { text: "Mindie" }
};

let current = root;

// ---------- STORAGE ----------
function save() {
  localStorage.setItem("akinator", JSON.stringify(root));
}

function load() {
  return JSON.parse(localStorage.getItem("akinator"));
}

// ---------- UI ----------
function show(text) {
  document.getElementById("q").textContent = text;
}

// ---------- GAME ----------
function answer(isYes) {
  if (current.yes || current.no) {
    current = isYes ? current.yes : current.no;
    ask();
  } else {
    if (isYes) {
      showEndScreen("I guessed it! It's " + current.text + "!");
    } else {
      learn();
    }
  }
}

function ask() {
  if (current.yes || current.no) {
    show(current.text);
  } else {
    show("Is it " + current.text + "?");
  }
}

// ---------- END SCREEN ----------
function showEndScreen(text) {
  document.getElementById("q").textContent = text;

  document.getElementById("buttons").classList.add("hidden");

  const learnBox = document.getElementById("learn");
  learnBox.classList.remove("hidden");

  learnBox.innerHTML = `
    <div style="margin-top:10px;">
      <p>Would you like to play again?</p>
      <button class="yes" onclick="reset()">Yes</button>
      <button class="no" onclick="noReplay()">No</button>
    </div>
  `;
}

function noReplay() {
  document.getElementById("q").textContent = "Thanks for playing!";
  document.getElementById("learn").classList.add("hidden");
}

// ---------- LEARNING ----------
function learn() {
  document.getElementById("buttons").classList.add("hidden");

  const learnBox = document.getElementById("learn");
  learnBox.classList.remove("hidden");

  learnBox.innerHTML = `
    <p>Who were you thinking of?</p>
    <input id="name" placeholder="Name"/>

    <p>Give me a yes/no question:</p>
    <input id="question" placeholder="Question"/>

    <p>For this person, is the answer YES?</p>

    <button class="yes" onclick="submitLearn(true)">Yes</button>
    <button class="no" onclick="submitLearn(false)">No</button>
  `;
}

function submitLearn(isYes) {
  const name = document.getElementById("name").value;
  const question = document.getElementById("question").value;

  const old = current.text;

  current.text = question;

  const newPerson = { text: name };
  const oldPerson = { text: old };

  if (isYes) {
    current.yes = newPerson;
    current.no = oldPerson;
  } else {
    current.yes = oldPerson;
    current.no = newPerson;
  }

  save();

  show("Learned something new!");

  setTimeout(reset, 1200);
}

// ---------- RESET ----------
function reset() {
  current = root;

  document.getElementById("buttons").classList.remove("hidden");
  document.getElementById("learn").classList.add("hidden");

  ask();
}

ask();
</script>

</body>
</html>
