<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akinator Lite</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      overflow: hidden;
    }

    .app {
      width: 92%;
      max-width: 420px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      text-align: center;
      color: white;
      animation: popIn 0.6s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h2 {
      margin: 0 0 10px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    #question {
      font-size: 20px;
      min-height: 60px;
      transition: all 0.3s ease;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button {
      margin: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:active {
      transform: scale(0.95);
    }

    .yes {
      background: #00c853;
      color: white;
      box-shadow: 0 4px 15px rgba(0,200,83,0.4);
    }

    .no {
      background: #ff3d00;
      color: white;
      box-shadow: 0 4px 15px rgba(255,61,0,0.4);
    }

    input {
      padding: 12px;
      width: 90%;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 14px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>🧠 Akinator Lite</h2>
  <p id="question">Think of a character...</p>
  <div id="buttons">
    <button class="yes" onclick="answer(true)">Yes</button>
    <button class="no" onclick="answer(false)">No</button>
  </div>
  <div id="inputArea" style="display:none;"></div>
</div>

<script>
class Node {
  constructor(data, isQuestion) {
    this.data = data;
    this.isQuestion = isQuestion;
    this.yes = null;
    this.no = null;
  }
}

let root = loadTree() || defaultTree();
let current = root;

function defaultTree() {
  let root = new Node("Is the person male?", true);
  root.yes = new Node("Bryson", false);
  root.no = new Node("Mindie", false);
  return root;
}

// -------- STORAGE (local fallback) --------
function saveTreeLocal() {
  localStorage.setItem("akinatorTree", JSON.stringify(root));
}

function loadTree() {
  let data = localStorage.getItem("akinatorTree");
  return data ? JSON.parse(data) : null;
}

// -------- OPTIONAL CLOUD SYNC (Firebase) --------
/*
  To enable online shared knowledge:
  1. Create Firebase project
  2. Enable Realtime Database
  3. Paste config below
*/

const firebaseConfig = null; // <-- replace with your config
let db = null;

function initCloud() {
  if (!firebaseConfig || !window.firebase) return;

  firebase.initializeApp(firebaseConfig);
  db = firebase.database();

  db.ref("akinatorTree").on("value", (snap) => {
    if (snap.val()) {
      root = snap.val();
      resetGame();
    }
  });
}

function saveTreeCloud() {
  if (db) db.ref("akinatorTree").set(root);
}

function saveTree() {
  saveTreeLocal();
  saveTreeCloud();
}

// -------- GAME LOGIC --------
function showQuestion(text) {
  const q = document.getElementById("question");
  q.style.opacity = 0;
  setTimeout(() => {
    q.innerText = text;
    q.style.opacity = 1;
  }, 150);
}

function answer(ans) {
  if (current.isQuestion) {
    current = ans ? current.yes : current.no;
    nextStep();
  } else {
    if (ans) {
      showQuestion("🎉 I guessed it!");
      resetGame();
    } else {
      learnNewCharacter();
    }
  }
}

function nextStep() {
  if (current.isQuestion) {
    showQuestion(current.data);
  } else {
    showQuestion("Is it " + current.data + "?");
  }
}

// -------- LEARNING --------
function learnNewCharacter() {
  document.getElementById("buttons").style.display = "none";

  const inputArea = document.getElementById("inputArea");
  inputArea.style.display = "block";

  inputArea.innerHTML = `
    <div class="card">
      <p>Who were you thinking of?</p>
      <input id="person" placeholder="Name">
      <p>Question to distinguish them:</p>
      <input id="questionInput" placeholder="Question">
      <p>For your character, is the answer YES?</p>
      <button class="yes" onclick="submitLearning(true)">Yes</button>
      <button class="no" onclick="submitLearning(false)">No</button>
    </div>
  `;
}

function submitLearning(answerForNew) {
  let newPerson = document.getElementById("person").value;
  let newQuestion = document.getElementById("questionInput").value;

  let oldData = current.data;

  current.data = newQuestion;
  current.isQuestion = true;

  let newNode = new Node(newPerson, false);
  let oldNode = new Node(oldData, false);

  if (answerForNew) {
    current.yes = newNode;
    current.no = oldNode;
  } else {
    current.yes = oldNode;
    current.no = newNode;
  }

  saveTree();

  showQuestion("🧠 Learned something new!");
  setTimeout(resetGame, 1500);
}

function resetGame() {
  current = root;
  document.getElementById("buttons").style.display = "block";
  document.getElementById("inputArea").style.display = "none";
  nextStep();
}

nextStep();
initCloud();
</script>

<!-- Firebase (optional) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

</body>
</html>
